name: スナップショット更新

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: スナップショットを生成
        run: node .github/scripts/generate-snapshot.js
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          PROJECTS_CONFIG: ${{ secrets.PROJECTS_CONFIG }}

      - name: snapshot.json をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot.json
          git diff --cached --quiet && echo "変更なし" && exit 0
          git commit -m "chore: snapshot更新"
          git push
