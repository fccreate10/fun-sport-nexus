<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EVENT PM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--surface:#fff;--card:#fffefa;
  --ink:#1a1a18;--sub:#6b6b65;--faint:#b0afa8;
  --border:#e4e2dc;--border2:#d0cec6;
  --accent:#c8501a;--accentL:rgba(200,80,26,0.08);
  --blue:#2563c8;--blueL:rgba(37,99,200,0.08);
  --green:#1a7a4a;--greenL:rgba(26,122,74,0.08);
  --amber:#b06010;--amberL:rgba(176,96,16,0.08);
  --r:8px;--r2:12px;
  --p1:#2563c8;--p1L:rgba(37,99,200,0.10);
  --p2:#1a7a4a;--p2L:rgba(26,122,74,0.10);
  --p3:#7c3aed;--p3L:rgba(124,58,237,0.10);
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px}
/* loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:14px}
#loading.hidden{display:none}
.loading-logo{font-size:12px;font-weight:700;letter-spacing:.14em;color:var(--accent)}
.loading-spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.loading-msg{font-size:12px;color:var(--faint)}
@keyframes spin{to{transform:rotate(360deg)}}
/* shell */
#shell{display:flex;min-height:100vh}
#side{width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
#main{flex:1;min-width:0;overflow-y:auto;height:100vh}
.logo{padding:20px 20px 14px;border-bottom:1px solid var(--border)}
.logo-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--accent)}
.logo-sub{font-size:10px;color:var(--faint);margin-top:2px}
/* tabs */
.proj-tabs{display:flex;flex-direction:column;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border)}
.proj-tab{width:100%;padding:7px 10px;border-radius:var(--r);border:1.5px solid var(--border2);background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--sub);font-family:inherit;transition:all .15s;text-align:left;display:flex;align-items:center;gap:6px}
.proj-tab .tab-date{font-weight:400;opacity:.65;font-size:10px;margin-left:auto}
.proj-tab.p1.active{background:var(--p1);color:#fff;border-color:var(--p1)}
.proj-tab.p2.active{background:var(--p2);color:#fff;border-color:var(--p2)}
.proj-tab.p3.active{background:var(--p3);color:#fff;border-color:var(--p3)}
.proj-tab:not(.active):hover{background:var(--bg)}
/* nav */
nav{padding:10px;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--sub);border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:background .12s,color .12s;margin-bottom:2px}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--accentL);color:var(--accent);font-weight:500}
.nav-item.p1.active{background:var(--p1L);color:var(--p1)}
.nav-item.p2.active{background:var(--p2L);color:var(--p2)}
.nav-item.p3.active{background:var(--p3L);color:var(--p3)}
.nav-icon{font-size:14px;width:18px;text-align:center}
/* footer */
.side-footer{padding:11px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:5px}
/* sync bar */
#sync-bar{padding:7px 11px;border-radius:var(--r);font-size:11px;display:flex;align-items:center;gap:7px;transition:all .3s;cursor:default}
#sync-bar.ok{background:var(--greenL);color:var(--green)}
#sync-bar.loading{background:var(--blueL);color:var(--blue)}
#sync-bar.err{background:rgba(200,80,26,0.08);color:var(--accent);cursor:pointer}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.loading{background:var(--blue);animation:pulse .8s ease-in-out infinite}
.sync-dot.err{background:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.edit-toggle{width:100%;padding:7px 12px;border-radius:var(--r);font-size:12px;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--sub);transition:all .15s}
.edit-toggle.active{background:var(--accentL);color:var(--accent);border-color:rgba(200,80,26,0.2)}
.settings-btn{width:100%;padding:6px 12px;border-radius:var(--r);font-size:11px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:none;color:var(--faint);transition:all .15s}
.settings-btn:hover{color:var(--sub);background:var(--bg)}
/* views */
.view{display:none;padding:30px 32px;animation:fadeIn .2s ease}
.view.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* banner */
.proj-banner{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding:10px 16px;border-radius:var(--r2);font-size:13px;font-weight:600}
.proj-banner.p1{background:var(--p1L);color:var(--p1)}
.proj-banner.p2{background:var(--p2L);color:var(--p2)}
.proj-banner.p3{background:var(--p3L);color:var(--p3)}
.proj-banner-name{flex:1}
.proj-banner-date{font-size:11px;font-weight:400;opacity:.75}
/* section */
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:18px;font-weight:700;color:var(--ink)}
.section-sub{font-size:12px;color:var(--faint)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 22px;margin-bottom:14px}
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.stat-val{font-size:26px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ink)}
.stat-label{font-size:11px;color:var(--sub);margin-top:4px}
.stat-card.accent .stat-val{color:var(--accent)}
.stat-card.green  .stat-val{color:var(--green)}
.stat-card.blue   .stat-val{color:var(--blue)}
.prog-wrap{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.prog-bar{height:100%;border-radius:4px;transition:width .6s ease}
.prog-bar.p1{background:linear-gradient(90deg,var(--p1),#4899f5)}
.prog-bar.p2{background:linear-gradient(90deg,var(--p2),#2ecc8f)}
.prog-bar.p3{background:linear-gradient(90deg,var(--p3),#a78bfa)}
/* tasks */
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.task-check.done      {background:var(--green);border-color:var(--green);color:#fff}
.task-check.review    {background:var(--amber);border-color:var(--amber);color:#fff}
.task-check.inprogress{background:var(--blue); border-color:var(--blue); color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;color:var(--ink);font-weight:500;line-height:1.5}
.task-title.done-text{text-decoration:line-through;color:var(--faint)}
.task-meta{display:flex;gap:5px;align-items:center;margin-top:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tag-todo      {background:var(--bg);color:var(--sub);border:1px solid var(--border2)}
.tag-inprogress{background:var(--blueL);color:var(--blue)}
.tag-review    {background:var(--amberL);color:var(--amber)}
.tag-done      {background:var(--greenL);color:var(--green)}
.tag-high  {background:rgba(200,80,26,0.08);color:var(--accent)}
.tag-medium{background:var(--amberL);color:var(--amber)}
.tag-low   {background:var(--bg);color:var(--faint)}
.due-label{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace}
.due-label.overdue{color:var(--accent)}
/* NA */
.na-item{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border)}
.na-item:last-child{border-bottom:none}
.na-num{width:22px;height:22px;border-radius:50%;background:var(--accentL);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.na-text{font-size:13px;color:var(--ink);line-height:1.6;flex:1}
.na-owner{font-size:11px;color:var(--faint);margin-top:2px}
/* edit */
.edit-bar{display:none;background:var(--accentL);border:1px solid rgba(200,80,26,0.15);border-radius:var(--r);padding:9px 14px;margin-bottom:14px;font-size:12px;color:var(--accent);font-weight:500;align-items:center;gap:8px}
.edit-bar.show{display:flex}
.edit-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.edit-btn.ghost{background:transparent;color:var(--accent);border:1px solid rgba(200,80,26,0.3)}
/* form */
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.form-label{font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.06em}
.form-input{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--ink);font-family:inherit;transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--accent)}
select.form-input option{background:#fff}
.form-row{display:flex;gap:10px}
.form-row .form-field{flex:1}
.form-note{font-size:11px;color:var(--faint);margin-top:-4px}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r2);padding:26px;width:480px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-section{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.08em;margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
/* Roadmap */
.rm-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.rm-seg{display:flex;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.rm-seg-btn{padding:6px 12px;font-size:12px;font-family:inherit;cursor:pointer;border:none;background:none;color:var(--sub);transition:all .12s}
.rm-seg-btn.active{background:var(--ink);color:#fff}
.rm-wrap{display:flex;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;background:var(--card)}
.rm-labels{width:186px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border)}
.rm-labels-head{height:52px;flex-shrink:0;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 12px 10px;font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.06em}
.rm-chart{flex:1;overflow-x:auto;display:flex;flex-direction:column;max-height:calc(100vh - 240px)}
.rm-chart-inner{position:relative;display:flex;flex-direction:column}
.rm-header{height:52px;position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);z-index:10;display:flex;flex-direction:column;flex-shrink:0}
.rm-months{display:flex;height:26px;border-bottom:1px solid var(--border)}
.rm-weeks {display:flex;height:26px}
.rm-month-cell{border-right:1px solid var(--border);display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;flex-shrink:0}
.rm-week-cell {border-right:1px solid var(--border2);display:flex;align-items:center;padding:0 5px;font-size:10px;color:var(--faint);flex-shrink:0}
.rm-label-row{height:40px;display:flex;align-items:center;padding:0 10px;border-bottom:1px solid var(--border);gap:6px;flex-shrink:0}
.rm-label-row:hover{background:var(--bg)}
.rm-label-text{font-size:12px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.rm-section-lbl{height:24px;display:flex;align-items:center;padding:0 10px;background:var(--bg);font-size:10px;font-weight:700;color:var(--faint);letter-spacing:.07em;border-bottom:1px solid var(--border);flex-shrink:0}
.rm-rows-wrap{position:relative;flex:1}
.rm-row{height:40px;position:relative;border-bottom:1px solid var(--border);flex-shrink:0}
.rm-section-row{height:24px;position:relative;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.rm-bar{position:absolute;top:9px;height:22px;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:default}
.rm-bar.todo      {background:var(--bg);border:1.5px solid var(--border2);color:var(--sub)}
.rm-bar.inprogress{background:var(--blueL);border:1.5px solid var(--blue);color:var(--blue)}
.rm-bar.review    {background:var(--amberL);border:1.5px solid var(--amber);color:var(--amber)}
.rm-bar.done      {background:var(--greenL);border:1.5px solid var(--green);color:var(--green);opacity:.6}
.rm-bar.proj-p1   {background:var(--p1L);border:1.5px solid var(--p1);color:var(--p1)}
.rm-bar.proj-p2   {background:var(--p2L);border:1.5px solid var(--p2);color:var(--p2)}
.rm-bar.proj-p3   {background:var(--p3L);border:1.5px solid var(--p3);color:var(--p3)}
.rm-today{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);z-index:5;pointer-events:none}
.rm-today-lbl{position:absolute;top:2px;font-size:9px;font-weight:700;color:var(--accent);white-space:nowrap;transform:translateX(-50%)}
.rm-vline{position:absolute;top:0;bottom:0;width:1px;background:var(--border);z-index:1;pointer-events:none}
.rm-vline.month{background:var(--border2)}
.rm-nodue{position:absolute;top:50%;transform:translateY(-50%);font-size:11px;color:var(--faint);padding-left:10px;font-style:italic}
.rm-proj-pill{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;flex-shrink:0}
.rm-proj-pill.p1{background:var(--p1L);color:var(--p1)}
.rm-proj-pill.p2{background:var(--p2L);color:var(--p2)}
.rm-proj-pill.p3{background:var(--p3L);color:var(--p3)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<!-- ローディング画面 -->
<div id="loading">
  <div class="loading-logo">EVENT PM</div>
  <div class="loading-spin"></div>
  <div class="loading-msg">データを読み込み中...</div>
</div>

<div id="shell" style="display:none">
  <div id="side">
    <div class="logo">
      <div class="logo-title">EVENT PM</div>
      <div class="logo-sub" id="last-updated"></div>
    </div>
    <div class="proj-tabs">
      <button class="proj-tab p1 active" data-pid="nagoya"><span>🏙</span>名古屋案件<span class="tab-date">10月</span></button>
      <button class="proj-tab p2"        data-pid="orisen"><span>🏟</span>オリセン案件<span class="tab-date">12月</span></button>
      <button class="proj-tab p3"        data-pid="march"> <span>🌸</span>3月案件<span class="tab-date">3月</span></button>
    </div>
    <nav id="nav">
      <button class="nav-item active" data-view="today"><span class="nav-icon">☀</span>本日のタスク</button>
      <button class="nav-item" data-view="status"><span class="nav-icon">◎</span>ステータス</button>
      <button class="nav-item" data-view="next"><span class="nav-icon">▶</span>ネクストアクション</button>
      <button class="nav-item" data-view="tasks"><span class="nav-icon">☑</span>タスク一覧</button>
      <button class="nav-item" data-view="roadmap"><span class="nav-icon">◈</span>ロードマップ</button>
    </nav>
    <div class="side-footer">
      <div id="sync-bar" class="ok"><div class="sync-dot ok" id="sync-dot"></div><span id="sync-text">読み込み済み</span></div>
      <button class="edit-toggle" id="editToggleBtn">✎ 編集モード</button>
      <button class="settings-btn" id="settingsBtn">⚙ 管理者設定</button>
    </div>
  </div>

  <div id="main">
    <!-- TODAY -->
    <div class="view show" id="view-today">
      <div id="banner-today" class="proj-banner p1"></div>
      <div class="section-head">
        <div><div class="section-title">本日のタスク</div><div class="section-sub" id="today-date"></div></div>
        <button class="edit-btn ghost" id="add-today-btn" style="display:none">＋ タスクを追加</button>
      </div>
      <div class="edit-bar" id="eb-today"><span>✎ 編集モード — 今日フラグの切り替え・タスク追加ができます</span></div>
      <div class="card" id="today-list"></div>
      <div class="section-head" style="margin-top:6px"><div class="section-title" style="font-size:15px">進捗メモ</div></div>
      <div class="card" id="memo-area"></div>
    </div>
    <!-- STATUS -->
    <div class="view" id="view-status">
      <div id="banner-status" class="proj-banner p1"></div>
      <div class="section-head"><div class="section-title">全体ステータス</div></div>
      <div class="status-grid" id="stat-grid"></div>
      <div class="card" id="progress-card"></div>
      <div class="card" id="overview-card"></div>
    </div>
    <!-- NEXT -->
    <div class="view" id="view-next">
      <div id="banner-next" class="proj-banner p1"></div>
      <div class="section-head">
        <div><div class="section-title">ネクストアクション</div><div class="section-sub">優先度順</div></div>
        <button class="edit-btn ghost" id="add-na-btn" style="display:none">＋ 追加</button>
      </div>
      <div class="edit-bar" id="eb-next"><span>✎ 編集モード有効</span></div>
      <div class="card" id="na-list"></div>
    </div>
    <!-- TASKS -->
    <div class="view" id="view-tasks">
      <div id="banner-tasks" class="proj-banner p1"></div>
      <div class="section-head">
        <div class="section-title">タスク一覧</div>
        <button class="edit-btn" id="add-task-btn" style="display:none">＋ タスクを追加</button>
      </div>
      <div class="edit-bar" id="eb-tasks"><span>✎ 編集モード有効</span></div>
      <div class="card" id="task-list"></div>
    </div>
    <!-- ROADMAP -->
    <div class="view" id="view-roadmap">
      <div class="section-head">
        <div><div class="section-title">ロードマップ</div><div class="section-sub" id="rm-range"></div></div>
      </div>
      <div class="rm-toolbar">
        <div class="rm-seg" id="rm-scope-seg">
          <button class="rm-seg-btn active" data-scope="current">現在の案件</button>
          <button class="rm-seg-btn" data-scope="all">🏙 ＋ 🏟 ＋ 🌸 全案件</button>
        </div>
        <select id="rm-group-sel" style="font-size:12px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--sub);font-family:inherit;cursor:pointer">
          <option value="tag">タグ別</option>
          <option value="status">ステータス別</option>
          <option value="assignee">担当者別</option>
          <option value="none">グループなし</option>
        </select>
      </div>
      <div id="rm-root"></div>
    </div>
  </div>
</div>

<script>
// ── プロジェクト定義 ──────────────────────────────────────────────────────────
const PROJECTS = {
  nagoya:{ id:'nagoya', name:'名古屋案件', short:'名古屋', emoji:'🏙', cls:'p1', date:'2026年10月' },
  orisen:{ id:'orisen', name:'オリセン案件', short:'オリセン', emoji:'🏟', cls:'p2', date:'2026年12月' },
  march: { id:'march',  name:'3月案件',    short:'3月',    emoji:'🌸', cls:'p3', date:'2026年3月' },
};

// ── ストレージ（ローカル上書き用） ────────────────────────────────────────────
const S = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  raw:(k)=>localStorage.getItem(k)||'',
};
const pk   = k => `epm5_${k}_${currentPid}`;
const passcode = () => S.raw('epm5_pass');

// ── 状態 ───────────────────────────────────────────────────────────────────
let currentPid  = localStorage.getItem('epm5_pid') || 'nagoya';
let snapshotData = {}; // snapshot.json から読み込んだデータ
let tasks, nextActions, memo, overview;
let editMode = false;
let rmScope  = 'current';

// ── snapshot.json を読み込む ──────────────────────────────────────────────────
async function loadSnapshot() {
  setSyncState('loading','データ取得中...');
  try {
    const res  = await fetch('./snapshot.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    snapshotData = json.projects || {};

    // 最終更新時刻を表示
    if (json.generatedAt) {
      const d = new Date(json.generatedAt);
      const label = d.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
      document.getElementById('last-updated').textContent = '最終更新: ' + label;
    }
    setSyncState('ok','データ読み込み済み');
  } catch(e) {
    setSyncState('err','読み込みエラー');
    // フォールバック: snapshot がなければ空データ
    snapshotData = {};
  }
}

function loadProjectData() {
  const snap = snapshotData[currentPid] || {};
  // ローカルの today フラグ上書きをマージ
  const localToday = S.get(pk('today_flags'), {});
  tasks = (snap.tasks || []).map(t => ({
    ...t,
    today: localToday[t.id] !== undefined ? localToday[t.id] : (t.today || false),
  }));
  // ネクストアクション・メモ・概要はローカル編集を優先
  nextActions = S.get(pk('na'),       snap.nextActions || []);
  memo        = S.get(pk('memo'),     snap.memo        || '');
  overview    = S.get(pk('overview'), snap.overview    || '');
}

function saveLocalEdits() {
  // today フラグだけローカル保存（タスク本体はスナップショットが正）
  const flags = {};
  tasks.forEach(t => { flags[t.id] = t.today; });
  S.set(pk('today_flags'), flags);
}
const saveNA       = () => S.set(pk('na'),       nextActions);
const saveMemo     = () => S.set(pk('memo'),     memo);
const saveOverview = () => S.set(pk('overview'), overview);

// ── DOM ヘルパー ──────────────────────────────────────────────────────────────
function el(tag,attrs={},text){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')e.className=v;
    else if(k==='style')e.style.cssText=v;
    else e.setAttribute(k,v);
  }
  if(text!==undefined)e.textContent=text;
  return e;
}

// ── 同期インジケーター ────────────────────────────────────────────────────────
function setSyncState(state, msg) {
  const bar = document.getElementById('sync-bar');
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  bar.className = state;
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
  if(state==='err') bar.onclick = () => location.reload();
  else bar.onclick = null;
}

// ── 起動 ─────────────────────────────────────────────────────────────────────
(async () => {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  await loadSnapshot();
  loadProjectData();

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('shell').style.display = 'flex';

  initNav(); initEditToggle(); initSettings();
  updateProjectUI(); renderAll();
})();

// ── プロジェクト切り替え ──────────────────────────────────────────────────────
function switchProject(pid){
  currentPid = pid;
  localStorage.setItem('epm5_pid', pid);
  loadProjectData();
  updateProjectUI();
  renderAll();
}

function updateProjectUI(){
  const proj = PROJECTS[currentPid];
  document.querySelectorAll('.proj-tab').forEach(t=>t.classList.toggle('active', t.dataset.pid===currentPid));
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.remove('p1','p2','p3');
    if(n.classList.contains('active')) n.classList.add(proj.cls);
  });
  document.querySelectorAll('.proj-banner').forEach(b=>{
    b.className=`proj-banner ${proj.cls}`;
    b.innerHTML=`<span style="font-size:18px">${proj.emoji}</span><span class="proj-banner-name">${proj.name}</span><span class="proj-banner-date">${proj.date}</span>`;
  });
  document.title = `EVENT PM — ${proj.name}`;
}

// ── ナビ ──────────────────────────────────────────────────────────────────────
function initNav(){
  document.querySelectorAll('.nav-item').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active','p1','p2','p3'));
      btn.classList.add('active', PROJECTS[currentPid].cls);
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('show'));
      document.getElementById('view-'+btn.dataset.view).classList.add('show');
      if(btn.dataset.view==='roadmap') renderRoadmap();
    });
  });
  document.querySelectorAll('.proj-tab').forEach(tab=>tab.addEventListener('click',()=>switchProject(tab.dataset.pid)));
  document.getElementById('rm-scope-seg').addEventListener('click',e=>{
    if(!e.target.dataset.scope)return;
    rmScope=e.target.dataset.scope;
    document.querySelectorAll('#rm-scope-seg .rm-seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.scope===rmScope));
    renderRoadmap();
  });
  document.getElementById('rm-group-sel').addEventListener('change',renderRoadmap);
}

// ── 編集モード ────────────────────────────────────────────────────────────────
function initEditToggle(){
  document.getElementById('editToggleBtn').addEventListener('click',()=>{
    if(editMode){setEdit(false);return;}
    const p=passcode();
    if(!p){setEdit(true);return;}
    const input=prompt('管理者パスコードを入力してください');
    if(input===p)setEdit(true);
    else if(input!==null)alert('パスコードが違います');
  });
}
function setEdit(on){
  editMode=on;
  const btn=document.getElementById('editToggleBtn');
  btn.classList.toggle('active',on);
  btn.textContent=on?'✎ 編集モード ON':'✎ 編集モード';
  document.querySelectorAll('.edit-bar').forEach(e=>e.classList.toggle('show',on));
  ['add-today-btn','add-na-btn','add-task-btn'].forEach(id=>{
    const e=document.getElementById(id);if(e)e.style.display=on?'':'none';
  });
  renderAll();
}

// ── 管理者設定 ────────────────────────────────────────────────────────────────
function initSettings(){
  document.getElementById('settingsBtn').addEventListener('click',()=>{
    const form=el('div');
    const ps=el('div',{class:'modal-section'},'管理者パスコード');
    const{wrap:pw,inp:passI}=fi('パスコード','password','新しいパスコードを入力（空欄で削除）');
    const pn=el('div',{class:'form-note'},'設定すると閲覧者はタスクを編集できなくなります');
    const rn=el('div',{class:'modal-section'},'データの更新について');
    const ri=el('div',{style:'font-size:12px;color:var(--sub);line-height:1.8'},
      'タスクデータは GitHub Actions が15分ごとに自動更新します。\nメモ・ネクストアクションはこのブラウザに保存されます。\n\n最新データに手動で更新するには↓');
    const reloadBtn=el('button',{class:'edit-btn ghost',style:'width:100%;padding:10px;margin-top:10px;font-size:13px'},'🔄 今すぐ最新データを読み込む');
    reloadBtn.addEventListener('click',async()=>{
      reloadBtn.textContent='読み込み中...'; reloadBtn.disabled=true;
      await loadSnapshot(); loadProjectData(); renderAll();
      reloadBtn.textContent='✅ 更新完了！'; setTimeout(()=>document.body.removeChild(overlay),1000);
    });
    [ps,pw,pn,rn,ri,reloadBtn].forEach(e=>form.appendChild(e));
    const overlay=makeModalOverlay('管理者設定',form,()=>{
      S.raw('epm5_pass'); // 読むだけ（保存は下で）
      if(passI.value!==undefined) localStorage.setItem('epm5_pass', passI.value.trim());
      return true;
    },'保存');
  });
}

// ── 全体レンダリング ──────────────────────────────────────────────────────────
function renderAll(){renderToday();renderStatus();renderNextActions();renderTasks();}

// ── 本日のタスク ──────────────────────────────────────────────────────────────
function renderToday(){
  const active=tasks.filter(t=>t.today&&t.status!=='done');
  const done  =tasks.filter(t=>t.today&&t.status==='done');
  const c=document.getElementById('today-list'); c.innerHTML='';
  if(!active.length&&!done.length)
    c.innerHTML='<div style="color:var(--faint);font-size:13px;padding:4px 0">本日のタスクはありません</div>';
  else [...active,...done].forEach(t=>c.appendChild(makeTaskRow(t)));

  const me=document.getElementById('memo-area'); me.innerHTML='';
  me.appendChild(el('div',{style:'font-size:12px;font-weight:600;color:var(--sub);letter-spacing:.06em;margin-bottom:10px'},'進捗メモ'));
  if(editMode){
    const ta=el('textarea',{class:'form-input',style:'width:100%;min-height:80px;resize:vertical;font-size:13px;line-height:1.7'});
    ta.value=memo;
    ta.addEventListener('input',()=>{memo=ta.value;saveMemo();});
    me.appendChild(ta);
  } else {
    me.appendChild(el('div',{style:'font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--ink)'},memo||'（メモなし）'));
  }
  document.getElementById('add-today-btn').onclick=()=>showAddTask(true);
}

function makeTaskRow(t){
  const isDone=t.status==='done';
  const row=el('div',{class:'task-row'});
  const chkCls=isDone?'done':t.status==='review'?'review':t.status==='inprogress'?'inprogress':'';
  const chk=el('div',{class:'task-check '+chkCls},isDone?'✓':t.status==='review'?'…':t.status==='inprogress'?'▶':'');
  row.appendChild(chk);
  const body=el('div',{class:'task-body'});
  body.appendChild(el('div',{class:'task-title'+(isDone?' done-text':'')},t.title));
  const meta=el('div',{class:'task-meta'});
  const sl={todo:'未着手',inprogress:'進行中',review:'レビュー',done:'完了'};
  meta.appendChild(el('span',{class:'tag tag-'+t.status},sl[t.status]||t.status));
  if(t.tag)      meta.appendChild(el('span',{class:'tag tag-todo'},t.tag));
  if(t.priority) meta.appendChild(el('span',{class:'tag tag-'+t.priority},{high:'高優先',medium:'中優先',low:'低優先'}[t.priority]));
  if(t.assignee) meta.appendChild(el('span',{style:'font-size:10px;color:var(--faint)'},'担当: '+t.assignee));
  if(t.due){
    const over=new Date(t.due)<new Date()&&t.status!=='done';
    meta.appendChild(el('span',{class:'due-label'+(over?' overdue':'')},( over?'⚠ ':'')+t.due));
  }
  body.appendChild(meta); row.appendChild(body);
  if(editMode){
    const tl=el('label',{style:'display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);cursor:pointer;flex-shrink:0;white-space:nowrap'});
    const cb=el('input'); cb.type='checkbox'; cb.checked=t.today; cb.style.accentColor='var(--accent)';
    cb.addEventListener('change',()=>{t.today=cb.checked;saveLocalEdits();renderAll();});
    tl.appendChild(cb); tl.appendChild(document.createTextNode('今日'));
    row.appendChild(tl);
  }
  return row;
}

// ── ステータス ────────────────────────────────────────────────────────────────
function renderStatus(){
  const counts={todo:0,inprogress:0,review:0,done:0};
  tasks.forEach(t=>counts[t.status]=(counts[t.status]||0)+1);
  const total=tasks.length, pct=total?Math.round(counts.done/total*100):0;
  const grid=document.getElementById('stat-grid'); grid.innerHTML='';
  [{label:'総タスク数',val:total,cls:''},{label:'進行中',val:counts.inprogress,cls:'blue'},
   {label:'レビュー待ち',val:counts.review,cls:'accent'},{label:'完了',val:counts.done,cls:'green'}]
  .forEach(s=>{
    const c=el('div',{class:'stat-card '+s.cls});
    c.appendChild(el('div',{class:'stat-val'},String(s.val)));
    c.appendChild(el('div',{class:'stat-label'},s.label));
    grid.appendChild(c);
  });
  const cls=PROJECTS[currentPid].cls;
  document.getElementById('progress-card').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600">全体進捗率</div>
      <div style="font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--${cls})">${pct}%</div>
    </div>
    <div class="prog-wrap"><div class="prog-bar ${cls}" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap">
      ${[{l:'未着手',v:counts.todo,c:'var(--faint)'},{l:'進行中',v:counts.inprogress,c:'var(--blue)'},
         {l:'レビュー',v:counts.review,c:'var(--amber)'},{l:'完了',v:counts.done,c:'var(--green)'}]
        .map(s=>`<span style="font-size:11px;color:var(--sub)"><span style="color:${s.c};font-weight:600">${s.v}</span> ${s.l}</span>`).join('')}
    </div>`;
  const oc=document.getElementById('overview-card'); oc.innerHTML='';
  oc.appendChild(el('div',{style:'font-size:12px;font-weight:600;color:var(--sub);letter-spacing:.06em;margin-bottom:10px'},'プロジェクト概要'));
  if(editMode){
    const ta=el('textarea',{class:'form-input',style:'width:100%;min-height:80px;resize:vertical;font-size:13px;line-height:1.7'});
    ta.value=overview;
    ta.addEventListener('input',()=>{overview=ta.value;saveOverview();});
    oc.appendChild(ta);
  } else {
    oc.appendChild(el('div',{style:'font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--ink)'},overview||'（概要なし）'));
  }
}

// ── ネクストアクション ─────────────────────────────────────────────────────────
function renderNextActions(){
  const list=document.getElementById('na-list'); list.innerHTML='';
  if(!nextActions.length){
    list.appendChild(el('div',{style:'color:var(--faint);font-size:13px'},'ネクストアクションはありません'));
  } else {
    nextActions.forEach((na,i)=>{
      const row=el('div',{class:'na-item'}), body=el('div',{style:'flex:1'});
      body.appendChild(el('div',{class:'na-text'},na.text));
      if(na.owner)body.appendChild(el('div',{class:'na-owner'},'担当: '+na.owner));
      row.appendChild(el('div',{class:'na-num'},String(i+1))); row.appendChild(body);
      if(editMode){
        const del=el('button',{style:'background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0;flex-shrink:0;line-height:1'},'×');
        del.addEventListener('click',()=>{nextActions=nextActions.filter(x=>x.id!==na.id);saveNA();renderNextActions();});
        row.appendChild(del);
      }
      list.appendChild(row);
    });
  }
  document.getElementById('add-na-btn').onclick=showAddNA;
}

// ── タスク一覧 ────────────────────────────────────────────────────────────────
function renderTasks(){
  const list=document.getElementById('task-list'); list.innerHTML='';
  const order={inprogress:0,review:1,todo:2,done:3};
  [...tasks].sort((a,b)=>(order[a.status]||0)-(order[b.status]||0)).forEach(t=>list.appendChild(makeTaskRow(t)));
  document.getElementById('add-task-btn').onclick=()=>showAddTask(false);
}

// ── ロードマップ ───────────────────────────────────────────────────────────────
function renderRoadmap(){
  const root=document.getElementById('rm-root'); root.innerHTML='';
  const DAY=86400000,DW=26,ROW=40,SEC=24;
  const today=new Date(); today.setHours(0,0,0,0);

  let allRows=[];
  if(rmScope==='all'){
    for(const[pid,proj]of Object.entries(PROJECTS)){
      const snap=snapshotData[pid]||{};
      const localToday=S.get(`epm5_today_flags_${pid}`,{});
      (snap.tasks||[]).forEach(t=>allRows.push({...t,today:localToday[t.id]??t.today,_pid:pid,_proj:proj}));
    }
  } else {
    tasks.forEach(t=>allRows.push({...t,_pid:currentPid,_proj:PROJECTS[currentPid]}));
  }

  const dued=allRows.filter(t=>t.due).map(t=>new Date(t.due).getTime());
  const startD=new Date(today); startD.setDate(startD.getDate()-7);
  const endRaw=dued.length?new Date(Math.max(...dued)):new Date(today);
  const endD=new Date(endRaw); endD.setDate(endD.getDate()+21);
  const totalDays=Math.ceil((endD-startD)/DAY), totalW=totalDays*DW;

  document.getElementById('rm-range').textContent=
    startD.toLocaleDateString('ja-JP',{month:'short',day:'numeric'})+' — '+
    endD.toLocaleDateString('ja-JP',{month:'short',day:'numeric'});

  const groupBy=document.getElementById('rm-group-sel').value;
  function getGroup(t){
    if(rmScope==='all') return t._proj.name;
    if(groupBy==='tag') return t.tag||'（タグなし）';
    if(groupBy==='status') return {todo:'未着手',inprogress:'進行中',review:'レビュー',done:'完了'}[t.status]||t.status;
    if(groupBy==='assignee') return t.assignee||'（未設定）';
    return '__all__';
  }
  const withDue=allRows.filter(t=>t.due).sort((a,b)=>new Date(a.due)-new Date(b.due));
  const withoutDue=allRows.filter(t=>!t.due);
  const groups={};
  withDue.forEach(t=>{const g=getGroup(t);if(!groups[g])groups[g]=[];groups[g].push(t);});

  function dayX(date){return Math.round((date-startD)/DAY)*DW;}

  function buildHeader(){
    const hdr=el('div',{style:`width:${totalW}px;display:flex;flex-direction:column;`});
    const months=el('div',{class:'rm-months'}), weeks=el('div',{class:'rm-weeks'});
    let d=new Date(startD), curM=-1, mw=0; const mc=[];
    for(let i=0;i<totalDays;i++){
      const m=d.getMonth();
      if(m!==curM){if(curM!==-1)mc.push({m:curM,days:mw});curM=m;mw=0;}
      mw++;
      if(i%7===0){const wc=el('div',{class:'rm-week-cell',style:`width:${DW*7}px;min-width:${DW*7}px`});wc.textContent=d.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'});weeks.appendChild(wc);}
      d.setDate(d.getDate()+1);
    }
    mc.push({m:curM,days:mw});
    const mn=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    mc.forEach(c=>{const cell=el('div',{class:'rm-month-cell',style:`width:${c.days*DW}px;min-width:${c.days*DW}px`});cell.textContent=mn[c.m];months.appendChild(cell);});
    hdr.appendChild(months); hdr.appendChild(weeks); return hdr;
  }

  const wrap=el('div',{class:'rm-wrap'});
  const labelsCol=el('div',{class:'rm-labels'});
  const chartCol=el('div',{class:'rm-chart'});
  const inner=el('div',{class:'rm-chart-inner',style:`width:${totalW}px`});
  const hdrEl=el('div',{class:'rm-header',style:`width:${totalW}px`});
  hdrEl.appendChild(buildHeader()); inner.appendChild(hdrEl);
  labelsCol.appendChild(el('div',{class:'rm-labels-head'},'タスク名'));
  const labelsBody=el('div');
  const rowsWrap=el('div',{class:'rm-rows-wrap',style:`width:${totalW}px`});

  // grid lines
  let d=new Date(startD);
  for(let i=0;i<totalDays;i++){
    if(d.getDay()===1||d.getDate()===1)
      rowsWrap.appendChild(el('div',{class:'rm-vline'+(d.getDate()===1?' month':''),style:`left:${i*DW}px`}));
    d.setDate(d.getDate()+1);
  }
  const tx=dayX(today);
  if(tx>=0&&tx<=totalW){
    rowsWrap.appendChild(el('div',{class:'rm-today',style:`left:${tx}px`}));
    rowsWrap.appendChild(el('div',{class:'rm-today-lbl',style:`left:${tx}px`},'今日'));
  }

  function addSection(name){
    labelsBody.appendChild(el('div',{class:'rm-section-lbl'},name.toUpperCase()));
    rowsWrap.appendChild(el('div',{class:'rm-section-row',style:`width:${totalW}px`}));
  }
  function addRow(t){
    const lrow=el('div',{class:'rm-label-row'});
    lrow.appendChild(el('div',{style:`width:7px;height:7px;border-radius:50%;flex-shrink:0;background:${{todo:'var(--faint)',inprogress:'var(--blue)',review:'var(--amber)',done:'var(--green)'}[t.status]||'var(--faint)'}`}));
    lrow.appendChild(el('div',{class:'rm-label-text',title:t.title},t.title));
    if(rmScope==='all') lrow.appendChild(el('span',{class:'rm-proj-pill '+t._proj.cls},t._proj.short));
    labelsBody.appendChild(lrow);
    const crow=el('div',{class:'rm-row',style:`width:${totalW}px`});
    const due=new Date(t.due); due.setHours(0,0,0,0);
    const dueX=dayX(due);
    const bs=new Date(due); bs.setDate(bs.getDate()-7);
    const bx=Math.max(0,dayX(bs)), bw=Math.max(DW,dueX-bx+DW);
    const barCls='rm-bar '+(rmScope==='all'?'proj-'+t._proj.cls:t.status);
    const bar=el('div',{class:barCls,style:`left:${bx}px;width:${bw}px`},t.title);
    bar.title=`${t.title} — ${t.due}`;
    crow.appendChild(bar); rowsWrap.appendChild(crow);
  }

  if(rmScope==='all'||groupBy==='none'){
    if(rmScope==='all') Object.entries(groups).forEach(([g,gt])=>{addSection(g);gt.forEach(addRow);});
    else withDue.forEach(addRow);
  } else {
    Object.entries(groups).forEach(([g,gt])=>{addSection(g);gt.forEach(addRow);});
  }
  if(withoutDue.length){
    addSection('期日未設定');
    withoutDue.forEach(t=>{
      const lrow=el('div',{class:'rm-label-row'});
      lrow.appendChild(el('div',{style:'width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--faint)'}));
      lrow.appendChild(el('div',{class:'rm-label-text',style:'color:var(--faint)'},t.title));
      if(rmScope==='all') lrow.appendChild(el('span',{class:'rm-proj-pill '+t._proj.cls},t._proj.short));
      labelsBody.appendChild(lrow);
      const crow=el('div',{class:'rm-row',style:`width:${totalW}px`});
      crow.appendChild(el('div',{class:'rm-nodue'},'期日未設定'));
      rowsWrap.appendChild(crow);
    });
  }
  if(!withDue.length&&!withoutDue.length)
    labelsBody.appendChild(el('div',{style:'padding:20px 12px;color:var(--faint);font-size:13px'},'タスクがありません'));

  inner.appendChild(rowsWrap);
  chartCol.appendChild(inner);
  labelsCol.appendChild(labelsBody);
  wrap.appendChild(labelsCol); wrap.appendChild(chartCol);
  root.appendChild(wrap);
  setTimeout(()=>{chartCol.scrollLeft=Math.max(0,tx-80);},50);
}

// ── モーダル ──────────────────────────────────────────────────────────────────
function makeModalOverlay(title,content,onSave,saveLabel='追加'){
  const bg=el('div',{class:'modal-bg'}), m=el('div',{class:'modal'});
  m.appendChild(el('div',{class:'modal-title'},title)); m.appendChild(content);
  const actions=el('div',{class:'modal-actions'});
  const cancel=el('button',{class:'edit-btn ghost'},'キャンセル');
  cancel.addEventListener('click',()=>document.body.removeChild(bg));
  const save=el('button',{class:'edit-btn'},saveLabel);
  save.addEventListener('click',()=>{if(onSave())document.body.removeChild(bg);});
  actions.appendChild(cancel); actions.appendChild(save); m.appendChild(actions);
  bg.appendChild(m); bg.addEventListener('click',e=>{if(e.target===bg)document.body.removeChild(bg);});
  document.body.appendChild(bg); return bg;
}
function fi(label,type,placeholder){
  const wrap=el('div',{class:'form-field'});
  wrap.appendChild(el('div',{class:'form-label'},label));
  const inp=type==='textarea'?el('textarea'):type==='select'?el('select'):el('input');
  inp.className='form-input';
  if(type!=='select'&&type!=='textarea')inp.type=type;
  if(placeholder)inp.placeholder=placeholder;
  if(type==='textarea')inp.rows=2;
  wrap.appendChild(inp); return{wrap,inp};
}
function showAddTask(asToday){
  const{wrap:tw,inp:titleI}=fi('タスク名 *','text','例: スポンサーに連絡する');
  const{wrap:aw,inp:assigneeI}=fi('担当者','text','例: 自分');
  const{wrap:dw,inp:dueI}=fi('期日','date','');
  const{wrap:tagW,inp:tagI}=fi('タグ','text','例: 広報');
  const{wrap:pw,inp:priSel}=fi('優先度','select','');
  [['high','高優先'],['medium','中優先'],['low','低優先']].forEach(([v,l])=>{const o=el('option');o.value=v;o.textContent=l;priSel.appendChild(o);});
  const{wrap:sw,inp:stSel}=fi('ステータス','select','');
  [['todo','未着手'],['inprogress','進行中'],['review','レビュー'],['done','完了']].forEach(([v,l])=>{const o=el('option');o.value=v;o.textContent=l;stSel.appendChild(o);});
  const tl=el('label',{style:'display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub);cursor:pointer;padding:6px 0 2px'});
  const cb=el('input');cb.type='checkbox';cb.checked=asToday;cb.style.accentColor='var(--accent)';
  tl.appendChild(cb);tl.appendChild(document.createTextNode('今日のタスクに追加'));
  const note=el('div',{style:'font-size:11px;color:var(--faint);padding:8px 0'},
    '※ 追加したタスクはこのブラウザにのみ保存されます。GitHub Projects と反映させるには管理者がGitHub側で追加してください。');
  const form=el('div'); const r1=el('div',{class:'form-row'});r1.appendChild(pw);r1.appendChild(sw);
  [tw,aw,dw,tagW,r1,tl,note].forEach(e=>form.appendChild(e));
  makeModalOverlay('タスクを追加（ローカル）',form,()=>{
    if(!titleI.value.trim())return false;
    const nt={id:'local_'+Date.now(),ghItemId:null,title:titleI.value.trim(),assignee:assigneeI.value,due:dueI.value,tag:tagI.value,priority:priSel.value,status:stSel.value,today:cb.checked};
    tasks.push(nt); saveLocalEdits(); renderAll(); return true;
  });
}
function showAddNA(){
  const{wrap:tw,inp:textI}=fi('アクション内容 *','text','例: ○○に連絡する');
  const{wrap:ow,inp:ownerI}=fi('担当者','text','例: 自分');
  const form=el('div');[tw,ow].forEach(e=>form.appendChild(e));
  makeModalOverlay('ネクストアクションを追加',form,()=>{
    if(!textI.value.trim())return false;
    nextActions.push({id:'n'+Date.now(),text:textI.value.trim(),owner:ownerI.value});
    saveNA();renderNextActions();return true;
  });
}
