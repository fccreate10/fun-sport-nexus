<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EVENT PM — プロジェクト進捗ボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3ee;--surface:#fff;--card:#fffefa;
  --ink:#1a1a18;--sub:#6b6b65;--faint:#b0afa8;
  --border:#e4e2dc;--border2:#d0cec6;
  --accent:#c8501a;--accentL:rgba(200,80,26,0.08);
  --blue:#2563c8;--blueL:rgba(37,99,200,0.08);
  --green:#1a7a4a;--greenL:rgba(26,122,74,0.08);
  --amber:#b06010;--amberL:rgba(176,96,16,0.08);
  --r:8px;--r2:12px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:14px}
#shell{display:flex;min-height:100vh}
#side{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
#main{flex:1;min-width:0;overflow-y:auto;height:100vh}
.logo{padding:22px 20px 16px;border-bottom:1px solid var(--border)}
.logo-title{font-size:12px;font-weight:700;letter-spacing:.12em;color:var(--accent)}
.logo-sub{font-size:11px;color:var(--faint);margin-top:3px}
nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--sub);border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:background .12s,color .12s;margin-bottom:2px}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.active{background:var(--accentL);color:var(--accent);font-weight:500}
.nav-icon{font-size:15px;width:18px;text-align:center}
.side-footer{padding:12px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.edit-toggle{width:100%;padding:8px 12px;border-radius:var(--r);font-size:12px;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--sub);transition:all .15s}
.edit-toggle.active{background:var(--accentL);color:var(--accent);border-color:rgba(200,80,26,0.2)}
.settings-btn{width:100%;padding:7px 12px;border-radius:var(--r);font-size:11px;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:none;color:var(--faint);transition:all .15s}
.settings-btn:hover{color:var(--sub);background:var(--bg)}
/* Sync indicator */
#sync-bar{padding:8px 12px;border-radius:var(--r);font-size:11px;display:flex;align-items:center;gap:7px;transition:all .3s;cursor:default}
#sync-bar.idle{background:none;color:var(--faint)}
#sync-bar.ok{background:var(--greenL);color:var(--green)}
#sync-bar.syncing{background:var(--blueL);color:var(--blue)}
#sync-bar.err{background:rgba(200,80,26,0.08);color:var(--accent);cursor:pointer}
#sync-bar.disconnected{background:none;color:var(--faint)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--blue);animation:pulse .8s ease-in-out infinite}
.sync-dot.err{background:var(--accent)}
.sync-dot.idle{background:var(--faint)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
/* views */
.view{display:none;padding:32px;animation:fadeIn .2s ease}
.view.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:18px;font-weight:700;color:var(--ink)}
.section-sub{font-size:12px;color:var(--faint)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px 22px;margin-bottom:14px}
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.stat-val{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:var(--ink)}
.stat-label{font-size:11px;color:var(--sub);margin-top:4px}
.stat-card.accent .stat-val{color:var(--accent)}
.stat-card.green  .stat-val{color:var(--green)}
.stat-card.blue   .stat-val{color:var(--blue)}
.prog-wrap{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:8px}
.prog-bar{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--amber));transition:width .6s ease}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.task-check.done      {background:var(--green);border-color:var(--green);color:#fff}
.task-check.review    {background:var(--amber);border-color:var(--amber);color:#fff}
.task-check.inprogress{background:var(--blue); border-color:var(--blue); color:#fff}
.task-body{flex:1;min-width:0}
.task-title{font-size:13px;color:var(--ink);font-weight:500;line-height:1.5}
.task-title.done-text{text-decoration:line-through;color:var(--faint)}
.task-meta{display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.tag-todo      {background:var(--bg);color:var(--sub);border:1px solid var(--border2)}
.tag-inprogress{background:var(--blueL);color:var(--blue)}
.tag-review    {background:var(--amberL);color:var(--amber)}
.tag-done      {background:var(--greenL);color:var(--green)}
.tag-high  {background:rgba(200,80,26,0.08);color:var(--accent)}
.tag-medium{background:var(--amberL);color:var(--amber)}
.tag-low   {background:var(--bg);color:var(--faint)}
.due-label{font-size:10px;color:var(--faint);font-family:'DM Mono',monospace}
.due-label.overdue{color:var(--accent)}
.gh-badge{font-size:10px;color:var(--blue);background:var(--blueL);border-radius:10px;padding:1px 6px;font-family:'DM Mono',monospace}
.na-item{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.na-item:last-child{border-bottom:none}
.na-num{width:22px;height:22px;border-radius:50%;background:var(--accentL);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.na-text{font-size:13px;color:var(--ink);line-height:1.6;flex:1}
.na-owner{font-size:11px;color:var(--faint);margin-top:2px}
.edit-bar{display:none;background:var(--accentL);border:1px solid rgba(200,80,26,0.15);border-radius:var(--r);padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--accent);font-weight:500;align-items:center;gap:8px}
.edit-bar.show{display:flex}
.edit-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.edit-btn.ghost{background:transparent;color:var(--accent);border:1px solid rgba(200,80,26,0.3)}
.edit-btn.blue{background:var(--blue)}
.edit-btn.green{background:var(--green)}
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.form-label{font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.06em}
.form-input{background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-size:13px;color:var(--ink);font-family:inherit;transition:border-color .15s}
.form-input:focus{outline:none;border-color:var(--accent)}
select.form-input option{background:#fff}
.form-row{display:flex;gap:10px}
.form-row .form-field{flex:1}
.form-note{font-size:11px;color:var(--faint);margin-top:-4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r2);padding:28px;width:500px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px}
.modal-section{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.08em;margin:20px 0 12px;padding-top:16px;border-top:1px solid var(--border)}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.mapping-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px}
.mapping-label{min-width:80px;color:var(--sub)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>

<div id="shell">
  <div id="side">
    <div class="logo">
      <div class="logo-title">EVENT PM</div>
      <div class="logo-sub">プロジェクト進捗ボード</div>
    </div>
    <nav id="nav">
      <button class="nav-item active" data-view="today"><span class="nav-icon">☀</span>本日のタスク</button>
      <button class="nav-item" data-view="status"><span class="nav-icon">◎</span>ステータス</button>
      <button class="nav-item" data-view="next"><span class="nav-icon">▶</span>ネクストアクション</button>

  <div id="main">

    <!-- NEXT ACTIONS -->
    <div class="view" id="view-next">

        <button class="edit-btn ghost" id="add-na-btn" style="display:none">＋ 追加</button>

    <div class="view" id="view-tasks">

      <div class="card" id="task-list"></div>

</div>

<script>
// ── ストレージ ─────────────────────────────────────────────────────────────────
const S = {
  get:    (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set:    (k, v)   => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  raw:    (k)      => localStorage.getItem(k) || '',
  rawSet: (k, v)   => localStorage.setItem(k, v),
};
const passcode  = () => S.raw('epm3_pass');
const getGhCfg  = () => S.get('epm3_gh', null);
const setGhCfg  = (v) => S.set('epm3_gh', v);
const isGhReady = () => { const c = getGhCfg(); return !!(c?.token && c?.projectId && c?.statusFieldId); };

// ── 初期データ ─────────────────────────────────────────────────────────────────
let tasks = S.get('epm3_tasks', [
  { id:'t1', title:'イベント企画書の作成',    status:'inprogress', priority:'high',   tag:'企画', assignee:'自分', due:'2026-04-10', today:true,  ghItemId:null },
  { id:'t2', title:'ベニュー候補リスト作成',  status:'todo',       priority:'high',   tag:'会場', assignee:'自分', due:'2026-04-15', today:false, ghItemId:null },
  { id:'t3', title:'スポンサー提案書の初稿',  status:'review',     priority:'high',   tag:'資金', assignee:'鈴木', due:'2026-04-18', today:false, ghItemId:null },
  { id:'t4', title:'キックオフMTG議事録整理', status:'done',       priority:'low',    tag:'管理', assignee:'自分', due:'2026-04-05', today:false, ghItemId:null },
  { id:'t5', title:'SNSプロモーション計画',   status:'todo',       priority:'medium', tag:'広報', assignee:'山田', due:'2026-04-25', today:false, ghItemId:null },
  { id:'t6', title:'予算計画書の策定',        status:'todo',       priority:'high',   tag:'財務', assignee:'自分', due:'2026-04-20', today:true,  ghItemId:null },
]);
let nextActions = S.get('epm3_na', [
  { id:'n1', text:'企画書のフォーマットを確定してチームに共有する', owner:'自分' },
  { id:'n2', text:'ベニュー3候補に見積もり依頼メールを送付する',    owner:'自分' },
  { id:'n3', text:'スポンサー提案書のレビュー結果を鈴木さんに返す', owner:'鈴木' },
  { id:'n4', text:'予算計画書の経費項目リストアップを完了させる',   owner:'自分' },
]);
let memo     = S.get('epm3_memo',     '企画フェーズは順調に進行中。スポンサー交渉を今週から本格化させる予定。');
let overview = S.get('epm3_overview', 'イベント開催予定：2026年6月中旬\n現フェーズ：企画・準備フェーズ\n主な課題：スポンサー確保・予算確定');
let editMode  = false;
let pollTimer = null;

const saveTasks = () => S.set('epm3_tasks', tasks);
const saveNA    = () => S.set('epm3_na', nextActions);

// ── DOM ヘルパー ───────────────────────────────────────────────────────────────
function el(tag, attrs = {}, text) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else e.setAttribute(k, v);
  }
  if (text !== undefined) e.textContent = text;
  return e;
}

// ── GitHub GraphQL API ────────────────────────────────────────────────────────
async function ghQuery(query, variables = {}) {
  const cfg = getGhCfg();
  const res = await fetch('https://api.github.com/graphql', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${cfg.token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, variables }),
  });
  if (!res.ok) throw new Error(`GitHub API HTTP ${res.status}`);
  const data = await res.json();
  if (data.errors?.length) throw new Error(data.errors[0].message);
  return data.data;
}

// プロジェクトメタデータ取得（ユーザー or Org 両対応）
async function ghFetchProjectMeta(token, owner, number) {
  const q = `query($login:String!,$num:Int!){
    user(login:$login){ projectV2(number:$num){
      id title
      fields(first:20){ nodes{
        ... on ProjectV2SingleSelectField{ id name options{id name} }
      }}
    }}
  }`;
  try {
    const d = await fetch('https://api.github.com/graphql', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q, variables: { login: owner, num: number } }),
    }).then(r => r.json());
    if (d.data?.user?.projectV2) return d.data.user.projectV2;
  } catch {}
  // org fallback
  const q2 = `query($login:String!,$num:Int!){
    organization(login:$login){ projectV2(number:$num){
      id title
      fields(first:20){ nodes{
        ... on ProjectV2SingleSelectField{ id name options{id name} }
      }}
    }}
  }`;
  const d2 = await fetch('https://api.github.com/graphql', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: q2, variables: { login: owner, num: number } }),
  }).then(r => r.json());
  if (d2.data?.organization?.projectV2) return d2.data.organization.projectV2;
  throw new Error('プロジェクトが見つかりません。Owner名とProject番号を確認してください。');
}

// ステータスオプションの自動マッピング
function autoMapStatus(options) {
  const patterns = {
    todo:       ['todo', 'to do', '未着手', 'backlog', 'open', 'not started', 'new'],
    inprogress: ['in progress', 'in-progress', '進行中', 'doing', 'wip', 'active', 'started'],
    review:     ['review', 'レビュー', 'in review', 'testing', 'qa', 'check'],
    done:       ['done', '完了', 'completed', 'closed', 'finished', 'merged'],
  };
  const map = {};
  for (const opt of options) {
    const name = opt.name.toLowerCase();
    for (const [status, keys] of Object.entries(patterns)) {
      if (!map[status] && keys.some(k => name.includes(k))) { map[status] = opt.id; break; }
    }
  }
  return map;
}

// プロジェクトの全アイテムを取得
async function ghFetchAllItems() {
  const cfg = getGhCfg();
  const q = `query($pid:ID!){
    node(id:$pid){
      ... on ProjectV2{
        items(first:100){
          nodes{
            id
            content{
              ... on DraftIssue{ title }
              ... on Issue{ title number state }
            }
            fieldValues(first:10){
              nodes{
                ... on ProjectV2ItemFieldSingleSelectValue{
                  optionId
                  field{ ... on ProjectV2SingleSelectField{ id } }
                }
              }
            }
          }
        }
      }
    }
  }`;
  const data = await ghQuery(q, { pid: cfg.projectId });
  return data.node?.items?.nodes || [];
}

// タスクをプロジェクトに追加（Draft Issue）
async function ghCreateItem(task) {
  const cfg = getGhCfg();
  const q = `mutation($pid:ID!,$title:String!){
    addProjectV2DraftIssue(input:{projectId:$pid,title:$title}){
      projectItem{ id }
    }
  }`;
  const data = await ghQuery(q, { pid: cfg.projectId, title: task.title });
  const itemId = data.addProjectV2DraftIssue?.projectItem?.id;
  if (!itemId) throw new Error('アイテム作成失敗');
  // ステータスも設定
  const optionId = cfg.statusMap[task.status];
  if (optionId && cfg.statusFieldId) await ghSetStatus(itemId, optionId);
  return itemId;
}

// ステータスフィールドを更新
async function ghSetStatus(itemId, optionId) {
  const cfg = getGhCfg();
  const q = `mutation($pid:ID!,$iid:ID!,$fid:ID!,$oid:String!){
    updateProjectV2ItemFieldValue(input:{
      projectId:$pid, itemId:$iid, fieldId:$fid,
      value:{singleSelectOptionId:$oid}
    }){ projectV2Item{ id } }
  }`;
  await ghQuery(q, { pid: cfg.projectId, iid: itemId, fid: cfg.statusFieldId, oid: optionId });
}

// アイテムを削除
async function ghDeleteItem(itemId) {
  const cfg = getGhCfg();
  const q = `mutation($pid:ID!,$iid:ID!){
    deleteProjectV2Item(input:{projectId:$pid,itemId:$iid}){ deletedItemId }
  }`;
  await ghQuery(q, { pid: cfg.projectId, iid: itemId });
}

// ── GitHub 同期ロジック ────────────────────────────────────────────────────────

// App → GitHub（タスク追加・ステータス変更・削除）
async function syncPush(task, action) {
  if (!isGhReady()) return;
  setSyncState('syncing');
  try {
    if (action === 'create') {
      const itemId = await ghCreateItem(task);
      task.ghItemId = itemId;
      saveTasks(); renderAll();
    } else if (action === 'status' && task.ghItemId) {
      const cfg = getGhCfg();
      const optionId = cfg.statusMap[task.status];
      if (optionId) await ghSetStatus(task.ghItemId, optionId);
    } else if (action === 'delete' && task.ghItemId) {
      await ghDeleteItem(task.ghItemId);
    }
    setSyncState('ok');
  } catch (e) {
    setSyncState('err', e.message);
  }
}

// GitHub → App（ポーリングで差分取得）
async function syncPull() {
  if (!isGhReady()) return;
  setSyncState('syncing');
  try {
    const cfg = getGhCfg();
    const items = await ghFetchAllItems();
    let changed = false;

    // optionId → statusキー の逆引きマップ
    const reverseMap = {};
    for (const [s, oid] of Object.entries(cfg.statusMap || {})) reverseMap[oid] = s;

    // GitHub側の既存アイテムIDセット
    const ghIds = new Set(items.map(i => i.id));

    // 1. GitHub → ローカルへの反映
    for (const item of items) {
      if (!item.content) continue;
      const title = item.content.title;

      // ステータスを取得
      const statusNode = item.fieldValues?.nodes?.find(n => n.optionId && n.field?.id === cfg.statusFieldId);
      const ghStatus = statusNode ? reverseMap[statusNode.optionId] : null;

      // 既存ローカルタスクとのマッチング
      const localTask = tasks.find(t => t.ghItemId === item.id);
      if (localTask) {
        // ステータス更新
        if (ghStatus && localTask.status !== ghStatus) {
          localTask.status = ghStatus;
          changed = true;
        }
        // タイトル更新
        if (title && localTask.title !== title) {
          localTask.title = title;
          changed = true;
        }
      } else {
        // GitHub に存在するがローカルにない → 新規タスクとして追加
        const newTask = {
          id: 't' + Date.now() + Math.random().toString(36).slice(2),
          title: title || '（無題）',
          status: ghStatus || 'todo',
          priority: 'medium', tag: '', assignee: '', due: '', today: false,
          ghItemId: item.id,
        };
        tasks.push(newTask);
        changed = true;
      }
    }

    // 2. GitHub側から消えたアイテムをローカルからも削除
    const toRemove = tasks.filter(t => t.ghItemId && !ghIds.has(t.ghItemId));
    if (toRemove.length > 0) {
      tasks = tasks.filter(t => !toRemove.includes(t));
      changed = true;
    }

    if (changed) { saveTasks(); renderAll(); }
    setSyncState('ok');
  } catch (e) {
    setSyncState('err', e.message);
  }
}

// 初回接続時：既存ローカルタスクを全部 GitHub にプッシュ
async function syncInitialPush() {
  const unsynced = tasks.filter(t => !t.ghItemId);
  if (unsynced.length === 0) return;
  setSyncState('syncing');
  for (const task of unsynced) {
    try {
      const itemId = await ghCreateItem(task);
      task.ghItemId = itemId;
    } catch {}
  }
  saveTasks();
  setSyncState('ok');
  renderAll();
}

// ポーリング開始（30秒ごと）
function startPolling() {
  stopPolling();
  syncPull();
  pollTimer = setInterval(syncPull, 30000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── 同期インジケーター ────────────────────────────────────────────────────────
let lastSyncOk = null;
function setSyncState(state, msg) {
  const bar  = document.getElementById('sync-bar');
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  bar.className  = state;
  dot.className  = 'sync-dot ' + state;
  if (state === 'ok') {
    lastSyncOk = new Date();
    text.textContent = '同期済み ' + lastSyncOk.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
    bar.onclick = null;
  } else if (state === 'syncing') {
    text.textContent = '同期中...';
    bar.onclick = null;
  } else if (state === 'err') {
    text.textContent = 'エラー — タップで再試行';
    bar.onclick = () => syncPull();
  } else {
    text.textContent = 'GitHub 未接続';
    bar.onclick = null;
  }
}

function showSettings() {
  const cfg = getGhCfg() || {};
  const form = el('div');

  // パスコードセクション
  const passSection = el('div', { class:'modal-section' }, 'パスコード設定');
  const { wrap:pw, inp:passI } = fi('編集パスコード', 'password', '新しいパスコードを入力（空欄で削除）');
  const passNote = el('div', { class:'form-note' }, '設定すると閲覧者はタスクを編集できなくなります');
  [passSection, pw, passNote].forEach(e => form.appendChild(e));

  // GitHubセクション
  const ghSection = el('div', { class:'modal-section' }, 'GitHub Projects 双方向同期');
  const { wrap:tw, inp:tokenI } = fi('Personal Access Token', 'password', 'ghp_...');
  tokenI.value = cfg.token || '';
  const tokenNote = el('div', { class:'form-note' }, 'スコープ: project — github.com/settings/tokens から作成');

  const row1 = el('div', { class:'form-row' });
  const { wrap:ow, inp:ownerI } = fi('Owner（ユーザー名またはOrg）', 'text', 'your-username');
  ownerI.value = cfg.owner || '';
  const { wrap:nw, inp:numI } = fi('Project 番号', 'text', '1');
  numI.value = cfg.projectNumber || '';
  row1.appendChild(ow); row1.appendChild(nw);

  // ステータスマッピング（接続済みの場合）
  let mappingArea = null;
  if (cfg.statusOptions) {
    mappingArea = buildMappingUI(cfg.statusOptions, cfg.statusMap || {});
  }

  // 接続ボタン
  const connectBtn = el('button', { class:'edit-btn blue', style:'width:100%;padding:10px;font-size:13px;margin-top:4px' }, '接続テスト & ステータスマッピング');
  const connectStatus = el('div', { style:'font-size:12px;color:var(--sub);margin-top:8px;min-height:18px' });

  connectBtn.addEventListener('click', async () => {
    const t = tokenI.value.trim(), o = ownerI.value.trim(), n = parseInt(numI.value.trim());
    if (!t || !o || !n) { connectStatus.textContent = 'すべて入力してください'; connectStatus.style.color='var(--accent)'; return; }
    connectBtn.textContent = '接続中...'; connectBtn.disabled = true;
    try {
      const meta = await ghFetchProjectMeta(t, o, n);
      const statusField = meta.fields.nodes.find(f => f.options);
      if (!statusField) throw new Error('ステータスフィールドが見つかりません');
      const autoMap = autoMapStatus(statusField.options);
      connectStatus.textContent = `✓ 接続成功: "${meta.title}" — ステータスオプションを確認してください`;
      connectStatus.style.color = 'var(--green)';
      // マッピングUIを更新
      if (mappingArea) mappingArea.remove();
      mappingArea = buildMappingUI(statusField.options, autoMap);
      form.insertBefore(mappingArea, connectBtn);
      // 一時保存
      form._ghMeta = { projectId: meta.id, statusFieldId: statusField.id, statusOptions: statusField.options };
    } catch (e) {
      connectStatus.textContent = 'エラー: ' + e.message;
      connectStatus.style.color = 'var(--accent)';
    }
    connectBtn.textContent = '接続テスト & ステータスマッピング'; connectBtn.disabled = false;
  });

  if (cfg.statusOptions) form.appendChild(el('div', { class:'modal-section' }, 'ステータスマッピング（GitHub → アプリ）'));
  [ghSection, tw, tokenNote, row1, connectBtn, connectStatus].forEach(e => form.appendChild(e));
  if (mappingArea) form.appendChild(mappingArea);

  makeModal('設定', form, () => {
    // パスコード保存
    S.rawSet('epm3_pass', passI.value.trim());
    // GitHub設定保存
    const t = tokenI.value.trim(), o = ownerI.value.trim(), n = parseInt(numI.value.trim());
    if (t && o && n && form._ghMeta) {
      const map = extractMapping(mappingArea);
      const newCfg = {
        token: t, owner: o, projectNumber: n,
        projectId:     form._ghMeta.projectId,
        statusFieldId: form._ghMeta.statusFieldId,
        statusOptions: form._ghMeta.statusOptions,
        statusMap: map,
      };
      setGhCfg(newCfg);
      syncInitialPush().then(() => startPolling());
    } else if (t && o && n && cfg.projectId) {
      // 既存設定を上書き（tokenのみ変更など）
      const map = mappingArea ? extractMapping(mappingArea) : cfg.statusMap;
      setGhCfg({ ...cfg, token: t, owner: o, projectNumber: n, statusMap: map });
      startPolling();
    }
    return true;
  }, '保存');
}

function buildMappingUI(options, currentMap) {
  const wrap = el('div', { style:'margin-top:12px' });
  wrap.appendChild(el('div', { style:'font-size:11px;font-weight:600;color:var(--sub);letter-spacing:.06em;margin-bottom:10px' }, 'ステータスマッピング'));
  const statusLabels = { todo:'未着手', inprogress:'進行中', review:'レビュー', done:'完了' };
  for (const [s, label] of Object.entries(statusLabels)) {
    const row = el('div', { class:'mapping-row' });
    row.appendChild(el('span', { class:'mapping-label' }, label));
    const sel = el('select', { class:'form-input', style:'flex:1', 'data-status':s });
    sel.appendChild(Object.assign(el('option'), { value:'', textContent:'（マップなし）' }));
    for (const opt of options) {
      const o = el('option'); o.value = opt.id; o.textContent = opt.name;
      if (currentMap[s] === opt.id) o.selected = true;
      sel.appendChild(o);
    }
    row.appendChild(sel);
    wrap.appendChild(row);
  }
  return wrap;
}

function extractMapping(mappingArea) {
  if (!mappingArea) return {};
  const map = {};
  mappingArea.querySelectorAll('select[data-status]').forEach(sel => {
    if (sel.value) map[sel.dataset.status] = sel.value;
  });
  return map;
}

function renderAll() { renderToday(); renderStatus(); renderNextActions(); renderTasks(); }

// ── 本日のタスク ───────────────────────────────────────────────────────────────
function renderToday() {
  const active = tasks.filter(t => t.today && t.status !== 'done');
  const done   = tasks.filter(t => t.today && t.status === 'done');
  const container = document.getElementById('today-list');
  container.innerHTML = '';

    container.innerHTML = '<div style="color:var(--faint);font-size:13px;padding:4px 0">本日のタスクはありません</div>';

// ── タスク行 ──────────────────────────────────────────────────────────────────
function makeTaskRow(t) {
  const isDone = t.status === 'done';
  const row    = el('div', { class:'task-row' });
  const chkClass = isDone ? 'done' : t.status === 'review' ? 'review' : t.status === 'inprogress' ? 'inprogress' : '';
  const chk = el('div', { class:'task-check ' + chkClass },
    isDone ? '✓' : t.status === 'review' ? '…' : t.status === 'inprogress' ? '▶' : '');
  if (editMode) {
    chk.style.cursor = 'pointer';
    chk.addEventListener('click', () => {
      const prev = t.status;
      t.status = isDone ? 'todo' : 'done';
      saveTasks(); renderAll();
      syncPush(t, 'status');
    });
  }
  row.appendChild(chk);
  const body = el('div', { class:'task-body' });
  body.appendChild(el('div', { class:'task-title' + (isDone ? ' done-text' : '') }, t.title));
  const meta = el('div', { class:'task-meta' });
  const statusLabel = { todo:'未着手', inprogress:'進行中', review:'レビュー', done:'完了' };
  meta.appendChild(el('span', { class:'tag tag-' + t.status }, statusLabel[t.status] || t.status));
  if (t.tag)      meta.appendChild(el('span', { class:'tag tag-todo' }, t.tag));
  if (t.priority) meta.appendChild(el('span', { class:'tag tag-' + t.priority }, { high:'高優先', medium:'中優先', low:'低優先' }[t.priority]));
  if (t.assignee) meta.appendChild(el('span', { style:'font-size:10px;color:var(--faint)' }, '担当: ' + t.assignee));
  if (t.ghItemId) meta.appendChild(el('span', { class:'gh-badge' }, 'GH'));
  if (t.due) {
    const isOver = new Date(t.due) < new Date() && t.status !== 'done';
    meta.appendChild(el('span', { class:'due-label' + (isOver ? ' overdue' : '') }, (isOver ? '⚠ 期日超過 ' : '') + t.due));
  }
  body.appendChild(meta);
  row.appendChild(body);
  if (editMode) {
    const statusSel = el('select', { class:'form-input', style:'font-size:11px;padding:4px 6px;width:90px;flex-shrink:0' });
    [['todo','未着手'],['inprogress','進行中'],['review','レビュー'],['done','完了']].forEach(([v,l]) => {
      const o = el('option'); o.value = v; o.textContent = l; if (t.status === v) o.selected = true;
      statusSel.appendChild(o);
    });
    statusSel.addEventListener('change', () => {
      t.status = statusSel.value; saveTasks(); renderAll();
      syncPush(t, 'status');
    });
    row.appendChild(statusSel);
    const del = el('button', { style:'background:none;border:none;color:var(--faint);cursor:pointer;font-size:16px;padding:0 0 0 4px;flex-shrink:0;line-height:1;margin-top:1px' }, '×');
    del.addEventListener('click', () => {
      const copy = { ...t };
      tasks = tasks.filter(x => x.id !== t.id); saveTasks(); renderAll();
      syncPush(copy, 'delete');
    });
    row.appendChild(del);
  }
  return row;
}

// ── ステータス ────────────────────────────────────────────────────────────────
function renderStatus() {
  const counts = { todo:0, inprogress:0, review:0, done:0 };
  tasks.forEach(t => counts[t.status] = (counts[t.status] || 0) + 1);
  const total = tasks.length, pct = total ? Math.round(counts.done / total * 100) : 0;
  const grid = document.getElementById('stat-grid');
  grid.innerHTML = '';
  [{ label:'総タスク数', val:total, cls:'' }, { label:'進行中', val:counts.inprogress, cls:'blue' },
   { label:'レビュー待ち', val:counts.review, cls:'accent' }, { label:'完了', val:counts.done, cls:'green' }]
  .forEach(s => {
    const c = el('div', { class:'stat-card ' + s.cls });
    c.appendChild(el('div', { class:'stat-val' }, String(s.val)));
    c.appendChild(el('div', { class:'stat-label' }, s.label));
    grid.appendChild(c);
  });
  document.getElementById('progress-card').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:600">全体進捗率</div>
      <div style="font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--accent)">${pct}%</div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div style="display:flex;gap:14px;margin-top:10px;flex-wrap:wrap">
      ${[{l:'未着手',v:counts.todo,c:'var(--faint)'},{l:'進行中',v:counts.inprogress,c:'var(--blue)'},
         {l:'レビュー',v:counts.review,c:'var(--amber)'},{l:'完了',v:counts.done,c:'var(--green)'}]
        .map(s=>`<span style="font-size:11px;color:var(--sub)"><span style="color:${s.c};font-weight:600">${s.v}</span> ${s.l}</span>`).join('')}
    </div>`;
  const oc = document.getElementById('overview-card');
  oc.innerHTML = '';
  oc.appendChild(el('div', { style:'font-size:12px;font-weight:600;color:var(--sub);letter-spacing:.06em;margin-bottom:10px' }, 'プロジェクト概要'));
  if (editMode) {
    const ta = el('textarea', { class:'form-input', style:'width:100%;min-height:80px;resize:vertical;font-size:13px;line-height:1.7' });
    ta.value = overview;
    ta.addEventListener('input', () => { overview = ta.value; S.set('epm3_overview', overview); });
    oc.appendChild(ta);
  } else {
    oc.appendChild(el('div', { style:'font-size:13px;line-height:1.85;white-space:pre-wrap;color:var(--ink)' }, overview || '（概要なし）'));
  }
}

function renderNextActions() {

// ── タスク一覧 ────────────────────────────────────────────────────────────────
function renderTasks() {
  const list = document.getElementById('task-list');
  list.innerHTML = '';
  const order = { inprogress:0, review:1, todo:2, done:3 };
  [...tasks].sort((a, b) => (order[a.status] || 0) - (order[b.status] || 0)).forEach(t => {
    const row = makeTaskRow(t);
    if (editMode) {
      const todayLabel = el('label', { style:'display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);cursor:pointer;flex-shrink:0;white-space:nowrap;margin-right:4px' });
      const cb = el('input'); cb.type = 'checkbox'; cb.checked = t.today; cb.style.accentColor = 'var(--accent)';
      cb.addEventListener('change', () => { t.today = cb.checked; saveTasks(); renderAll(); });
      todayLabel.appendChild(cb); todayLabel.appendChild(document.createTextNode('今日'));
      row.insertBefore(todayLabel, row.children[row.children.length - 2]);

// ── モーダル ──────────────────────────────────────────────────────────────────
function makeModal(title, content, onSave, saveLabel = '追加') {
  const bg = el('div', { class:'modal-bg' }), m = el('div', { class:'modal' });
  m.appendChild(el('div', { class:'modal-title' }, title));
  m.appendChild(content);
  const actions = el('div', { class:'modal-actions' });
  const cancel = el('button', { class:'edit-btn ghost' }, 'キャンセル');
  cancel.addEventListener('click', () => document.body.removeChild(bg));
  const save = el('button', { class:'edit-btn' }, saveLabel);
  save.addEventListener('click', () => { if (onSave()) document.body.removeChild(bg); });
  actions.appendChild(cancel); actions.appendChild(save);
  m.appendChild(actions); bg.appendChild(m);
  bg.addEventListener('click', e => { if (e.target === bg) document.body.removeChild(bg); });
  document.body.appendChild(bg);
}

function fi(label, type, placeholder) {
  const wrap = el('div', { class:'form-field' });
  wrap.appendChild(el('div', { class:'form-label' }, label));
  const inp = type === 'textarea' ? el('textarea') : type === 'select' ? el('select') : el('input');
  inp.className = 'form-input';
  if (type !== 'select' && type !== 'textarea') inp.type = type;
  if (placeholder) inp.placeholder = placeholder;
  if (type === 'textarea') inp.rows = 2;
  wrap.appendChild(inp);
  return { wrap, inp };
}

function showAddTask(asToday) {
  const { wrap:tw, inp:titleI }    = fi('タスク名 *',  'text',   '例: スポンサーに連絡する');
  const { wrap:aw, inp:assigneeI } = fi('担当者',      'text',   '例: 自分');
  const { wrap:dw, inp:dueI }      = fi('期日',        'date',   '');
  const { wrap:tagW, inp:tagI }    = fi('タグ',        'text',   '例: 広報, 財務');
  const { wrap:pw, inp:priSel }    = fi('優先度',      'select', '');
  [['high','高優先'],['medium','中優先'],['low','低優先']].forEach(([v,l]) => {
    const o = el('option'); o.value = v; o.textContent = l; priSel.appendChild(o);
  });
  const { wrap:sw, inp:stSel } = fi('ステータス', 'select', '');
  [['todo','未着手'],['inprogress','進行中'],['review','レビュー'],['done','完了']].forEach(([v,l]) => {
    const o = el('option'); o.value = v; o.textContent = l; stSel.appendChild(o);
  });
  const todayLabel = el('label', { style:'display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub);cursor:pointer;padding:6px 0 2px' });
  const cb = el('input'); cb.type = 'checkbox'; cb.checked = asToday; cb.style.accentColor = 'var(--accent)';
  todayLabel.appendChild(cb); todayLabel.appendChild(document.createTextNode('今日のタスクに追加'));
  const form = el('div');
  const row1 = el('div', { class:'form-row' }); row1.appendChild(pw); row1.appendChild(sw);
  [tw, aw, dw, tagW, row1, todayLabel].forEach(e => form.appendChild(e));

  if (isGhReady()) {
    const ghNote = el('div', { style:'font-size:11px;color:var(--blue);margin-top:6px;padding:6px 10px;background:var(--blueL);border-radius:6px' },
      '✓ GitHub Projects にも自動で追加されます');
    form.appendChild(ghNote);
  }

  makeModal('タスクを追加', form, () => {
    if (!titleI.value.trim()) return false;
    const newTask = {
      id: 't' + Date.now(), title: titleI.value.trim(),
      assignee: assigneeI.value, due: dueI.value, tag: tagI.value,
      priority: priSel.value, status: stSel.value, today: cb.checked, ghItemId: null,
    };
    tasks.push(newTask); saveTasks(); renderAll();
    syncPush(newTask, 'create');
    return true;
  });
}

function showAddNA() {
  const { wrap:tw, inp:textI }  = fi('アクション内容 *', 'text', '例: ○○に連絡する');
  const { wrap:ow, inp:ownerI } = fi('担当者',           'text', '例: 自分');
  const form = el('div'); [tw, ow].forEach(e => form.appendChild(e));
  makeModal('ネクストアクションを追加', form, () => {
    if (!textI.value.trim()) return false;
    nextActions.push({ id:'n' + Date.now(), text:textI.value.trim(), owner:ownerI.value });
    saveNA(); renderNextActions(); return true;
  });
}

// ── 起動 ──────────────────────────────────────────────────────────────────────
document.getElementById('today-date').textContent =
  new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

initNav(); initEditToggle(); initSettings();
renderAll();

// GitHub 接続済みならポーリング開始
if (isGhReady()) {
  startPolling();
} else {
  setSyncState('disconnected');
}
</script>
</body>
</html>
