name: Slack Task Notifications

on:
  schedule:
    # 毎朝 7:30 JST（UTC 22:30 前日）
    - cron: '30 22 * * *'
    # 毎週月曜 7:00 JST — 週次サマリー（UTC 22:00 日曜）
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      type:
        description: '通知の種類'
        required: false
        default: 'daily'
        type: choice
        options: [daily, weekly]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Slack通知を送信
        run: node .github/scripts/slack-notify.js
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PROJECTS_CONFIG: ${{ secrets.PROJECTS_CONFIG }}
          APP_URL: ${{ vars.APP_URL }}
          # スケジュール判定: 日曜 22:00 UTC = 月曜週次通知
          NOTIFY_TYPE: >-
            ${{ inputs.type != '' && inputs.type
                || (github.event.schedule == '0 22 * * 0' && 'weekly')
                || 'daily' }}
